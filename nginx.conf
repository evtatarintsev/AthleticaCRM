server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — никогда не кэшировать: точка входа, подтягивает остальные ресурсы
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    # .wasm файлы уже содержат хэш в имени — можно кэшировать навсегда
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # composeApp.js, styles.css, *.cvr — статические имена, всегда перепроверять через ETag
    location ~* \.(js|css|cvr)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
