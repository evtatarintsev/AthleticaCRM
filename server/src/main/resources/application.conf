ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [org.athletica.crm.ApplicationKt.module]
    }
}

database {
    url = ${POSTGRES_URL}
    user = ${POSTGRES_USER}
    password = ${POSTGRES_PASSWORD}
}

jwt {
    secret = "dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    accessTokenTtlMinutes = 15
    refreshTokenTtlDays = 30
}
