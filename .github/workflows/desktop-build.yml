name: Build Desktop App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact_path: composeApp/build/compose/binaries/main/dmg
            artifact_name: macos-dmg
          - os: windows-latest
            task: packageMsi
            artifact_path: composeApp/build/compose/binaries/main/msi
            artifact_name: windows-msi
          - os: ubuntu-latest
            task: packageDeb
            artifact_path: composeApp/build/compose/binaries/main/deb
            artifact_name: linux-deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop app
        run: ./gradlew :composeApp:${{ matrix.task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
