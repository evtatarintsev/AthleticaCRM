# athletica.crm → webpack dev server (frontend) + Ktor (backend API)
server {
    listen 80;
    server_name athletica.crm;

    # Ktor REST API
    location /api/ {
        proxy_pass         http://host.docker.internal:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # webpack HMR WebSocket
    location /ws {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Весь остальной трафик — webpack dev server (SPA)
    location / {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }
}

# minio.athletica.crm → MinIO S3 API (порт 9000)
# Используется браузером для загрузки файлов по presigned URL.
# Чтобы presigned URL-ы содержали этот хост, запускай Ktor с:
#   MINIO_ENDPOINT=http://minio.athletica.crm
server {
    listen 80;
    server_name minio.athletica.crm;

    client_max_body_size 100m;

    location / {
        proxy_pass       http://host.docker.internal:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering  off;
    }
}

# console.minio.athletica.crm → MinIO Web Console (порт 9001)
server {
    listen 80;
    server_name console.minio.athletica.crm;

    location / {
        proxy_pass         http://host.docker.internal:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }
}
